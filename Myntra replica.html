<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Myntra UI Clone</title>
<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}
header {background:white; padding:15px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 2px 5px rgba(0,0,0,0.1);} 
.logo {color:#ff3f6c; font-size:22px; font-weight:bold;}
nav span {margin:0 10px; cursor:pointer; font-weight:bold;}
header input {padding:8px; width:250px; border:1px solid #ccc; border-radius:5px;}
.container {display:flex;}
.sidebar {width:20%; background:white; padding:15px;}
.products {width:80%; display:grid; grid-template-columns: repeat(auto-fill,minmax(220px,1fr)); gap:20px; padding:20px;}
.card {background:white; border-radius:10px; overflow:hidden; box-shadow:0 2px 5px rgba(0,0,0,0.1); position:relative;}
.card img {width:100%; height:250px; object-fit:cover;}
.card-content {padding:10px;}
.brand {font-weight:bold;}
.price {color:#ff3f6c;}
.old-price {text-decoration:line-through; color:gray; font-size:12px;}
.discount {color:green; font-size:12px;}
button {background:#ff3f6c; color:white; border:none; padding:6px; cursor:pointer; margin-top:5px; width:100%;}
.wishlist {position:absolute; top:10px; right:10px; background:white; border-radius:50%; padding:5px; cursor:pointer;}
.rating {background:rgba(0,0,0,0.6); color:white; padding:3px 6px; position:absolute; bottom:70px; left:10px; border-radius:5px;}
.cart {position:fixed; right:0; top:0; width:280px; background:white; height:100%; padding:15px; overflow:auto; box-shadow:-2px 0 5px rgba(0,0,0,0.2);} 
.checkout {position:fixed; top:20%; left:35%; background:white; padding:20px; display:none; box-shadow:0 0 10px rgba(0,0,0,0.3);} 
@media(max-width:768px){
.container{flex-direction:column;}
.sidebar{width:100%;}
.products{width:100%;}
}
</style>
</head>
<body>

<header>
<div class="logo">Myntra</div>
<nav>
<span>Men</span>
<span>Women</span>
<span>Kids</span>
<span>Beauty</span>
</nav>
<input type="text" id="search" placeholder="Search for products" onkeyup="searchProducts()">
</header>

<div class="container">
<div class="sidebar">
<h3>Filters</h3>
<label><input type="checkbox" value="men" onchange="filterProducts()"> Men</label><br>
<label><input type="checkbox" value="women" onchange="filterProducts()"> Women</label>
</div>

<div class="products" id="productList"></div>
</div>

<div class="cart">
<h3>Cart</h3>
<ul id="cartItems"></ul>
<h4 id="total">Total: ₹0</h4>
<button onclick="openCheckout()">Checkout</button>
</div>

<div class="checkout" id="checkoutBox">
<h3>Checkout</h3>
<input type="text" placeholder="Enter Address"><br><br>
<select>
<option>Cash on Delivery</option>
<option>UPI</option>
<option>Card</option>
</select><br><br>
<button onclick="placeOrder()">Place Order</button>
</div>

<script>
let products = [
{id:1,name:"T-Shirt",brand:"Roadster",price:500,old:999,category:"men",rating:4,img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"},
{id:2,name:"Dress",brand:"Zara",price:1200,old:1999,category:"women",rating:5,img:"https://images.unsplash.com/photo-1495121605193-b116b5b09a77"},
{id:3,name:"Jeans",brand:"Levis",price:900,old:1500,category:"men",rating:3,img:"https://images.unsplash.com/photo-1541099649105-f69ad21f3246"},
{id:4,name:"Top",brand:"H&M",price:700,old:1200,category:"women",rating:4,img:"https://images.unsplash.com/photo-1520975922203-bb6d7c1a3c2b"}
];

let cart=[];

function displayProducts(list){
let html="";
list.forEach(p=>{
let discount=Math.round(((p.old-p.price)/p.old)*100);
html+=`<div class='card'>
<img src='${p.img}'>
<div class='wishlist' onclick='addToWishlist(${p.id})'>❤</div>
<div class='rating'>⭐ ${p.rating}</div>
<div class='card-content'>
<div class='brand'>${p.brand}</div>
<div>${p.name}</div>
<div class='price'>₹${p.price} <span class='old-price'>₹${p.old}</span> <span class='discount'>(${discount}% OFF)</span></div>
<button onclick='addToCart(${p.id})'>Add to Bag</button>
</div>
</div>`;
});
document.getElementById("productList").innerHTML=html;
}

function filterProducts(){
let checked=[...document.querySelectorAll("input:checked")].map(c=>c.value);
let filtered=checked.length?products.filter(p=>checked.includes(p.category)):products;
displayProducts(filtered);
}

function searchProducts(){
let q=document.getElementById("search").value.toLowerCase();
let result=products.filter(p=>p.name.toLowerCase().includes(q));
displayProducts(result);
}

function addToCart(id){
let item=products.find(p=>p.id===id);
cart.push(item);
updateCart();
}

function updateCart(){
let html="";
let total=0;
cart.forEach(i=>{
html+=`<li>${i.name} - ₹${i.price}</li>`;
total+=i.price;
});
document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText="Total: ₹"+total;
}

function addToWishlist(id){
alert("Added to wishlist ❤️");
}

function openCheckout(){
let total=0;
cart.forEach(i=> total+=i.price);
document.getElementById("checkoutBox").style.display="block";
document.getElementById("checkoutBox").innerHTML=`
<h3>Checkout</h3>
<p><b>Total Amount: ₹${total}</b></p>
<input type="text" placeholder="Enter Address"><br><br>
<select>
<option>Cash on Delivery</option>
<option>UPI</option>
<option>Card</option>
</select><br><br>
<button onclick="placeOrder()">Place Order</button>
`;
}

function placeOrder(){
alert("Order placed successfully!");
cart=[];
updateCart();
}

displayProducts(products);
</script>

</body>
</html>
